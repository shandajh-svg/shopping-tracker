<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shopping Tracker">
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAv0lEQVR4nO1UQQ6AIAwbxrsP8w2+zjf4Ht/g0XjQgyEhZpMyWSCGnghpRteyufXYTyqIruTjTUATQETU+8M8DixhWjZTAcUdcG97wLti6UIfp8jxpEBqou4IiO7utREgEUIO5IjgkwBL1C/A55caAzrC0Bg+i+aEaQTI9EQdsN6GcARa+2PCi09BdBN6hA5IXSGcJ1SbkIsD4agESIXCe4SjFmCN+gVInym8RzhqAVwhrjDC4QCPoRXq/wO/F3ABY1RQXffnoLAAAAAASUVORK5CYII=">
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAv0lEQVR4nO1UQQ6AIAwbxrsP8w2+zjf4Ht/g0XjQgyEhZpMyWSCGnghpRteyufXYTyqIruTjTUATQETU+8M8DixhWjZTAcUdcG97wLti6UIfp8jxpEBqou4IiO7utREgEUIO5IjgkwBL1C/A55caAzrC0Bg+i+aEaQTI9EQdsN6GcARa+2PCi09BdBN6hA5IXSGcJ1SbkIsD4agESIXCe4SjFmCN+gVInym8RzhqAVwhrjDC4QCPoRXq/wO/F3ABY1RQXffnoLAAAAAASUVORK5CYII=">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f2eb;--surface:#ffffff;--border:#d8d0c0;--border-light:#ece7dd;--text:#2c2416;--text-muted:#8a7d68;--accent:#5c7a3e;--accent-light:#e8f0e0;--urgent:#c04a2a;--urgent-light:#fceee9;--warn:#b07d20;--warn-light:#fdf5e0;--need-bg:#eef4e8;--shadow-md:0 4px 12px rgba(44,36,22,0.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.4;text-transform:uppercase;}
#app-header{background:var(--text);color:#f5f2eb;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
#app-header h1{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;letter-spacing:0.05em;white-space:nowrap;}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.btn{padding:5px 10px;border-radius:4px;border:1px solid;font-family:system-ui,sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;text-transform:uppercase;}
.btn-light{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25);color:#f5f2eb;}
.btn-light:hover{background:rgba(255,255,255,0.22);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:white;}
.btn-accent:hover{background:#4d6834;}
.btn-sm{padding:3px 8px;font-size:11px;}
.btn-danger{background:var(--urgent);border-color:var(--urgent);color:white;}
.btn-secondary{background:var(--surface);border-color:var(--border);color:var(--text);}
#sync-bar{background:#e8f0fe;border-bottom:1px solid #aac4f5;padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;}
#finance-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px 16px;align-items:center;}
.fin-group{display:flex;align-items:center;gap:5px;}
.fin-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.06em;color:var(--text-muted);text-transform:uppercase;white-space:nowrap;}
.fin-input{width:76px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text);border:1px solid var(--border);border-radius:3px;padding:2px 5px;background:var(--bg);text-align:right;}
.fin-input:focus{outline:none;border-color:var(--accent);}
.fin-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;}
.fin-divider{width:1px;height:20px;background:var(--border);}
.fin-positive{color:var(--accent);}
.fin-negative{color:var(--urgent);}
#fin-notes-area{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.fin-note-wrap{display:flex;gap:3px;align-items:center;}
#controls{background:var(--bg);padding:7px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border-light);}
#add-row-btn{display:inline-block;margin:0;padding:5px 14px;border:none;border-radius:4px;background:#1a73e8;color:white;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.04em;}
#add-row-btn:hover{background:#1558b0;}
#search-input{flex:1;min-width:150px;max-width:260px;padding:5px 9px;border:1px solid var(--border);border-radius:4px;font-family:system-ui,sans-serif;font-size:12px;background:var(--surface);text-transform:uppercase;}
#search-input:focus{outline:none;border-color:var(--accent);}
.filter-btn{padding:4px 9px;border-radius:4px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all 0.15s;text-transform:uppercase;}
.filter-btn.active{background:var(--text);color:white;border-color:var(--text);}
.filter-btn:hover:not(.active){border-color:var(--text-muted);color:var(--text);}
#item-count{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-left:auto;}
#bulk-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:11px;}
#bulk-bar .bulk-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);font-weight:700;text-transform:uppercase;white-space:nowrap;}
#bulk-bar .bulk-group{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
#bulk-bar .bulk-divider{width:1px;height:18px;background:var(--border);margin:0 4px;}
#table-wrap{overflow-x:auto;padding:0 16px 40px;}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead th{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.06em;color:var(--text-muted);text-transform:uppercase;padding:7px 5px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap;background:var(--bg);}
thead th.center{text-align:center;}
tbody tr{border-bottom:1px solid var(--border-light);transition:background 0.1s;}
tbody tr:hover{background:rgba(255,255,255,0.7);}
tbody tr.need-row{background:var(--need-bg);}
tbody tr.need-row:hover{background:#e4f0db;}
tbody tr.urgent-row{background:var(--urgent-light);}
tbody tr.warn-row{background:var(--warn-light);}
tbody tr.dup-warning{background:#fff3cd;}
td{padding:4px 5px;vertical-align:middle;}
td.td-need{text-align:center;width:28px;}
.need-check{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);}
td.td-due{width:80px;white-space:nowrap;}
.due-btn{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:3px;text-decoration:underline dotted;}
.due-btn:hover{background:rgba(0,0,0,0.06);}
.due-past{color:var(--urgent);}
.due-soon{color:var(--warn);}
.due-ok{color:var(--accent);}
.due-none{color:var(--text-muted);}
.due-clear{font-size:9px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:1px 2px;margin-left:1px;}
.due-clear:hover{color:var(--urgent);}
td.td-num{width:26px;text-align:center;padding:4px 2px;}
.store-num{display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--border-light);font-family:'DM Mono',monospace;font-size:10px;font-weight:500;text-align:center;line-height:20px;color:var(--text-muted);}
.store-num.sn-1{background:#e8daf5;color:#6b3fa0}.store-num.sn-2{background:#fce4ec;color:#c2185b}.store-num.sn-3{background:#e3f2fd;color:#1565c0}.store-num.sn-4{background:#fff8e1;color:#f57f17}.store-num.sn-5{background:#fce8d5;color:#b84a00}.store-num.sn-6{background:#e8f5e9;color:#2e7d32}.store-num.sn-7{background:#e0f7fa;color:#006064}.store-num.sn-8{background:#fffde7;color:#827717}.store-num.sn-9{background:#f3e5f5;color:#6a1b9a}.store-num.sn-10{background:#e8eaf6;color:#283593}.store-num.sn-11{background:#fbe9e7;color:#bf360c}.store-num.sn-12{background:#f1f8e9;color:#33691e}
td.td-item{width:200px;max-width:200px;}
.item-name{font-weight:700;font-size:12px;line-height:1.3;text-transform:uppercase;color:var(--text);cursor:pointer;}
.item-name:hover{text-decoration:underline;}
.dup-badge{display:inline-block;background:#ff9800;color:white;font-size:9px;font-weight:700;border-radius:3px;padding:1px 4px;margin-left:4px;vertical-align:middle;}
td.td-store{width:90px;max-width:90px;}
.store-name{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;cursor:pointer;}
.store-name:hover{text-decoration:underline;}
td.td-price{width:68px;min-width:68px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;}
td.td-edit{width:30px;text-align:center;padding:4px 2px;}
.edit-btn{width:26px;height:26px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s;}
.edit-btn:hover{background:var(--text);color:white;border-color:var(--text);}
td.td-notes{max-width:220px;}
.notes-text{font-size:12px;font-weight:500;color:var(--text-muted);white-space:pre-line;cursor:pointer;text-transform:uppercase;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;max-height:3.2em;}
.notes-text.expanded{display:block;-webkit-line-clamp:unset;max-height:none;overflow:visible;}
.date-popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;box-shadow:var(--shadow-md);z-index:500;width:240px;}
.date-popup h4{font-size:11px;color:var(--text-muted);margin-bottom:10px;font-weight:600;}
.date-popup-field{margin-bottom:8px;}
.date-popup-field label{display:block;font-size:10px;color:var(--text-muted);margin-bottom:3px;font-weight:600;}
.date-popup-field input{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:'DM Mono',monospace;background:var(--bg);}
.date-popup-field input:focus{outline:none;border-color:var(--accent);}
.date-popup-actions{display:flex;gap:6px;margin-top:10px;justify-content:space-between;align-items:center;}
.date-popup-clear{font-size:11px;color:var(--urgent);background:none;border:none;cursor:pointer;text-decoration:underline;text-transform:uppercase;}
#shopping-mode{display:none;position:fixed;inset:0;background:white;z-index:300;overflow-y:auto;}
#shopping-mode.open{display:block;}
#shopping-mode-header{background:var(--text);color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
#shopping-mode-header h2{font-size:16px;font-weight:600;}
.shop-store-header{background:var(--accent);color:white;padding:8px 16px;font-size:17px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;position:sticky;top:48px;}
.shop-item{padding:12px 16px;border-bottom:1px solid var(--border-light);display:grid;grid-template-columns:1fr auto;gap:3px 10px;}
.shop-item-name{font-size:21px;font-weight:700;color:var(--text);line-height:1.2;grid-column:1;}
.shop-item-price{font-size:21px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;grid-column:2;text-align:right;white-space:nowrap;}
.shop-item-due{font-size:12px;color:var(--text-muted);grid-column:1/-1;font-family:'DM Mono',monospace;}
.shop-item-notes{font-size:12px;color:var(--text-muted);grid-column:1/-1;line-height:1.4;margin-top:2px;white-space:pre-line;}
.shop-item-got{grid-column:1/-1;margin-top:6px;}
.shop-got-check{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--accent);cursor:pointer;}
.shop-item.got-it{opacity:0.4;}
.shop-item.got-it .shop-item-name{text-decoration:line-through;}
#edit-modal{display:none;position:fixed;inset:0;background:rgba(44,36,22,0.5);z-index:200;align-items:center;justify-content:center;}
#edit-modal.open{display:flex;}
.modal-box{background:var(--surface);border-radius:8px;padding:20px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);}
.modal-title{font-size:14px;font-weight:600;margin-bottom:14px;}
.modal-field{margin-bottom:10px;}
.modal-field label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px;font-weight:500;}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg);}
.modal-field textarea{height:80px;resize:vertical;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.urgency-legend{display:flex;gap:10px;align-items:center;font-size:10px;color:rgba(255,255,255,0.6);}
.legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px;}
#backup-modal{display:none;position:fixed;inset:0;background:rgba(44,36,22,0.5);z-index:250;align-items:center;justify-content:center;}
#backup-modal.open{display:flex;}
#backup-modal .modal-box{width:480px;}
#backup-modal textarea{width:100%;height:120px;font-family:'DM Mono',monospace;font-size:11px;background:#f5f5f5;border:1px solid var(--border);border-radius:4px;padding:8px;resize:vertical;}
</style>
</head>
<body>
<div id="app-header">
  <h1>🛒 SHOPPING TRACKER</h1>
  <div class="header-actions">
    <div class="urgency-legend">
      <span><span class="legend-dot" style="background:#c04a2a"></span>≤2d</span>
      <span><span class="legend-dot" style="background:#b07d20"></span>3–7d</span>
      <span><span class="legend-dot" style="background:#5c7a3e"></span>dated</span>
    </div>
    <button class="btn btn-light" onclick="sortByDate()">⇅ Date</button>
    <button class="btn btn-light" onclick="sortByStoreAZ()">A→Z Store</button>
    <button class="btn btn-light" onclick="sortByItemAZ()">A→Z Item</button>
    <button class="btn btn-light" onclick="sortByStoreNum()">⇅ Store #</button>
    <button class="btn btn-light" onclick="findDuplicates()">⚑ Dupes</button>
    <button class="btn btn-accent" onclick="openShoppingMode()">🛒 Shop</button>
  </div>
</div>
<div id="sync-bar" style="background:#e8f0fe;border-bottom:1px solid #aac4f5;padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;">
  <button onclick="pushToCloud()" style="background:#1a56c4;color:white;border:none;border-radius:4px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;">↑ Push</button>
  <button onclick="pullFromCloud()" style="background:#2e7d32;color:white;border:none;border-radius:4px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;">↓ Pull</button>
  <button onclick="openBackupModal()" style="background:#7b5ea7;color:white;border:none;border-radius:4px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;">💾 Backup</button>
  <button onclick="resetAndClean()" style="background:#c04a2a;color:white;border:none;border-radius:4px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;">🧹 Reset</button>
  <span id="sync-status" style="font-size:11px;font-weight:600;font-family:monospace;"></span>
</div>
<div id="finance-bar">
  <div class="fin-group"><span class="fin-label">Total Needed</span><span class="fin-value" id="fin-total-needed">$0.00</span></div>
  <div class="fin-divider"></div>
  <div class="fin-group"><span class="fin-label">Available</span><input class="fin-input" id="fin-available" type="number" step="0.01" value="0" oninput="saveFinance();updateFinance()"></div>
  <div class="fin-group"><span class="fin-label">Left Over</span><span class="fin-value" id="fin-leftover">$0.00</span></div>
  <div class="fin-divider"></div>
  <div id="fin-notes-area"></div>
  <button class="btn btn-sm" onclick="addFinNote()" style="font-size:11px;background:var(--surface);border-color:var(--border);color:var(--text);">+ Note</button>
</div>
<div id="bulk-bar">
  <span class="bulk-label">Bulk:</span>
  <div class="bulk-group">
    <button class="btn btn-secondary btn-sm" onclick="uncheckAllNeeds()">☐ Uncheck All</button>
    <button class="btn btn-secondary btn-sm" onclick="uncheckVisibleNeeds()">☐ Uncheck Shown</button>
  </div>
  <div class="bulk-divider"></div>
  <div class="bulk-group">
    <button class="btn btn-secondary btn-sm" onclick="clearAllDates()">✕ Clear All Dates</button>
    <button class="btn btn-secondary btn-sm" onclick="clearVisibleDates()">✕ Clear Shown Dates</button>
  </div>
</div>
<div id="controls">
  <button id="add-row-btn" onclick="openAddModal()">+ ADD ITEM</button>
  <input id="search-input" type="text" placeholder="Search items, stores, notes…" oninput="renderTable()">
  <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" id="filter-need" onclick="setFilter('need')">Needs Only</button>
  <button class="filter-btn" id="filter-dated" onclick="setFilter('dated')">Has Date</button>
  <label style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px;">
    Due by: <input type="date" id="filter-due-by" style="padding:3px 6px;border:1px solid var(--border);border-radius:3px;font-size:12px;" oninput="renderTable()">
    <button class="filter-btn" onclick="document.getElementById('filter-due-by').value='';renderTable()" style="padding:2px 6px;font-size:10px;">✕</button>
  </label>
  <span id="item-count"></span>
</div>
<div id="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th class="center">Need</th>
        <th style="width:80px">Due Date</th>
        <th class="center" style="width:26px">#</th>
        <th style="width:200px">Item</th>
        <th style="width:90px">Store</th>
        <th style="text-align:right;width:68px">Price</th>
        <th style="width:30px"></th>
        <th>Notes <span style="font-size:9px;font-weight:400;color:var(--text-muted)">(click to expand)</span></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>
<div id="date-popup" class="date-popup" style="display:none">
  <h4>📅 ADJUST DUE DATE</h4>
  <div class="date-popup-field">
    <label>Current Date</label>
    <div id="popup-current" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);padding:3px 0;"></div>
  </div>
  <div class="date-popup-field">
    <label>Shift by Days (+/-)</label>
    <input type="number" id="popup-offset" placeholder="e.g. 3 or -2" step="1">
  </div>
  <div class="date-popup-field">
    <label>Or Set Specific Date</label>
    <input type="date" id="popup-direct">
  </div>
  <div class="date-popup-actions">
    <button class="date-popup-clear" onclick="clearPopupDate()">✕ Clear Date</button>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-secondary btn-sm" onclick="closePopup()">Cancel</button>
      <button class="btn btn-accent btn-sm" onclick="applyPopup()">Apply</button>
    </div>
  </div>
</div>
<div id="shopping-mode">
  <div id="shopping-mode-header">
    <h2>🛒 Shopping Mode</h2>
    <button class="btn btn-light" onclick="closeShoppingMode()">✕ Exit</button>
  </div>
  <div id="shopping-mode-body"></div>
</div>
<div id="edit-modal">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">Edit Item</div>
    <div class="modal-field"><label>Item Name</label><input id="m-item" type="text"></div>
    <div class="modal-field"><label>Store</label><input id="m-store" type="text"></div>
    <div class="modal-field"><label>Store # (1–12)</label><input id="m-num" type="text"></div>
    <div class="modal-field"><label>Price</label><input id="m-price" type="text"></div>
    <div class="modal-field"><label>Notes</label><textarea id="m-notes"></textarea></div>
    <div class="modal-field">
      <label>Special Calculation (for due date)</label>
      <select id="m-calc">
        <option value="days">None</option>
        <option value="eggs">Eggs (qty ÷ 1.5)</option>
        <option value="cans">Tomato paste (cans × 4 days)</option>
        <option value="bags">Blueberries (bags × 16oz × 28.35 ÷ 100g)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" id="modal-delete-btn" onclick="deleteItem()">Delete</button>
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent btn-sm" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>
<div id="backup-modal">

var STORE_KEY='st_v3';
var JBIN_ID='69cc8912856a682189ea4991';
var JBIN_KEY='$2a$10$tpjsSaIqmjzoWXjpvpu7n.AdJJdQf8JUbDhBDfNoCC5rzN0vxDh/m';
var JBIN_URL='https://api.jsonbin.io/v3/b/'+JBIN_ID;

var items=[], currentFilter='all', editingId=null, popupItemId=null, _dupKeys=new Set();
var _modalOpening=false;

function genId(){return Date.now()*1000+Math.floor(Math.random()*1000);}

function today(){var d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function addDays(n){var d=today();d.setDate(d.getDate()+Math.round(n));var mm=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+(mm<10?'0':'')+mm+'-'+(dd<10?'0':'')+dd;}
function parseDue(str){if(!str)return null;var d=new Date(str+'T00:00:00');return isNaN(d)?null:d;}
function formatDue(str){var d=parseDue(str);if(!d)return '';return (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2);}
function dueClass(str){var d=parseDue(str);if(!d)return 'due-none';var diff=Math.floor((d-today())/86400000);if(diff<=2)return 'due-past';if(diff<=7)return 'due-soon';return 'due-ok';}
function rowUrgency(it){if(!it.due)return '';var d=parseDue(it.due);if(!d)return '';var diff=Math.floor((d-today())/86400000);if(diff<=2)return 'urgent-row';if(diff<=7)return 'warn-row';return '';}
function fmtPrice(p){if(!p&&p!==0)return '';var s=String(p).trim();if(!s)return '';return s.startsWith('$')?s:(isNaN(parseFloat(s))?s:'$'+parseFloat(s).toFixed(2));}
function escHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function numClass(n){var m={'1':'sn-1','2':'sn-2','3':'sn-3','4':'sn-4','5':'sn-5','6':'sn-6','7':'sn-7','8':'sn-8','9':'sn-9','10':'sn-10','11':'sn-11','12':'sn-12'};return m[String(n)]||'';}
function itemKey(it){return (it.item||'').trim().toLowerCase()+'|||'+(it.store||'').trim().toLowerCase();}

// ---- LOAD / SAVE ----
function loadItems(){
  try{
    var raw=localStorage.getItem(STORE_KEY);
    if(raw){
      var parsed=JSON.parse(raw);
      if(parsed&&parsed.items&&Array.isArray(parsed.items)){
        items=parsed.items;
        return;
      }
    }
  }catch(e){}
  // First load: use backup data, assign fresh ids
  items=INITIAL_DATA.map(function(it){
    return {id:genId(),item:it.item,store:it.store,num:it.num,price:it.price,notes:it.notes,calc:it.calc||'days',need:!!it.need,due:it.due||''};
  });
  saveItems();
}

function saveItems(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify({items:items}));}catch(e){}
}

// ---- FINANCE ----
function loadFinance(){
  try{
    var raw=localStorage.getItem('st_finance_v3');
    if(raw){var f=JSON.parse(raw);if(f.available!==undefined)document.getElementById('fin-available').value=f.available;if(f.notes)f.notes.forEach(function(n){addFinNote(n);});}
  }catch(e){}
  updateFinance();
}
function saveFinance(){
  try{var notes=[];document.querySelectorAll('.fin-note-input').forEach(function(el){notes.push(el.value);});localStorage.setItem('st_finance_v3',JSON.stringify({available:document.getElementById('fin-available').value,notes:notes}));}catch(e){}
}
function updateFinance(){
  var total=0;items.forEach(function(it){if(it.need){var p=parseFloat(it.price);if(!isNaN(p))total+=p;}});
  document.getElementById('fin-total-needed').textContent='$'+total.toFixed(2);
  var available=parseFloat(document.getElementById('fin-available').value)||0;
  var left=available-total;
  var el=document.getElementById('fin-leftover');
  el.textContent=(left>=0?'+$':'-$')+Math.abs(left).toFixed(2);
  el.className='fin-value '+(left>=0?'fin-positive':'fin-negative');
}
function addFinNote(val){
  var area=document.getElementById('fin-notes-area');
  var wrap=document.createElement('div');wrap.className='fin-note-wrap';
  var inp=document.createElement('input');inp.className='fin-input fin-note-input';inp.style.width='150px';inp.placeholder='note…';inp.value=val||'';inp.oninput=function(){saveFinance();};
  var del=document.createElement('button');del.textContent='✕';del.style.cssText='padding:2px 5px;font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:3px;cursor:pointer;';
  del.onclick=function(){wrap.remove();saveFinance();};
  wrap.append(inp,del);area.appendChild(wrap);
}

// ---- FILTER / SORT ----
function setFilter(f){
  currentFilter=f;
  ['all','need','dated'].forEach(function(x){document.getElementById('filter-'+x).classList.toggle('active',x===f);});
  renderTable();
}
function getFilteredItems(){
  var q=document.getElementById('search-input').value.toLowerCase().trim();
  var dueByVal=document.getElementById('filter-due-by').value;
  var dueByDate=dueByVal?new Date(dueByVal+'T00:00:00'):null;
  return items.filter(function(it){
    if(q){var h=(it.item+' '+it.store+' '+(it.notes||'')).toLowerCase();if(!h.includes(q))return false;}
    if(dueByDate){if(!it.due)return false;var d=parseDue(it.due);if(!d||d>dueByDate)return false;}
    if(currentFilter==='need')return it.need;
    if(currentFilter==='dated')return !!it.due;
    return true;
  });
}
function sortByDate(){items.sort(function(a,b){if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due.localeCompare(b.due);});saveItems();renderTable();}
function sortByStoreAZ(){items.sort(function(a,b){return (a.store||'').localeCompare(b.store||'');});saveItems();renderTable();}
function sortByItemAZ(){items.sort(function(a,b){return (a.item||'').localeCompare(b.item||'');});saveItems();renderTable();}
function sortByStoreNum(){items.sort(function(a,b){var na=parseInt(a.num)||999,nb=parseInt(b.num)||999;if(na!==nb)return na-nb;return (a.item||'').localeCompare(b.item||'');});saveItems();renderTable();}

// ---- DUPLICATES ----
function computeDuplicates(){
  var counts={};items.forEach(function(it){var k=itemKey(it);counts[k]=(counts[k]||0)+1;});
  _dupKeys=new Set();Object.keys(counts).forEach(function(k){if(counts[k]>1)_dupKeys.add(k);});
}
function findDuplicates(){
  computeDuplicates();
  if(_dupKeys.size===0){alert('No duplicate item+store combinations found!');return;}
  alert('Found '+_dupKeys.size+' duplicate item+store combination(s). They are highlighted in yellow.');
  renderTable();
}

// ---- NEEDS / DATES BULK ----
function toggleNeed(id,checked){var it=items.find(function(x){return x.id===id;});if(it){it.need=checked;saveItems();updateFinance();}}
function uncheckAllNeeds(){items.forEach(function(it){it.need=false;});saveItems();renderTable();}
function uncheckVisibleNeeds(){getFilteredItems().forEach(function(it){it.need=false;});saveItems();renderTable();}
function clearAllDates(){items.forEach(function(it){it.due='';});saveItems();renderTable();}
function clearVisibleDates(){getFilteredItems().forEach(function(it){it.due='';});saveItems();renderTable();}
function clearDue(id){var it=items.find(function(x){return x.id===id;});if(it){it.due='';saveItems();renderTable();}}

// ---- DATE POPUP ----
function openPopup(id,btn){
  popupItemId=id;
  var it=items.find(function(x){return x.id===id;});
  var pop=document.getElementById('date-popup');
  document.getElementById('popup-current').textContent=it&&it.due?formatDue(it.due):'No date set';
  document.getElementById('popup-offset').value='';
  document.getElementById('popup-direct').value=(it&&it.due)||'';
  var rect=btn.getBoundingClientRect();
  pop.style.display='block';
  pop.style.top=Math.min(rect.bottom+4,window.innerHeight-280)+'px';
  pop.style.left=Math.min(rect.left,window.innerWidth-250)+'px';
}
function closePopup(){document.getElementById('date-popup').style.display='none';popupItemId=null;}
function clearPopupDate(){var it=items.find(function(x){return x.id===popupItemId;});if(it){it.due='';saveItems();renderTable();}closePopup();}
function applyPopup(){
  var it=items.find(function(x){return x.id===popupItemId;});if(!it){closePopup();return;}
  var offset=document.getElementById('popup-offset').value;
  var direct=document.getElementById('popup-direct').value;
  if(offset!==''){
    var n=parseInt(offset);if(!isNaN(n)){
      var base=it.due?parseDue(it.due):today();
      var d=new Date(base);d.setDate(d.getDate()+n);
      var mm=d.getMonth()+1,dd=d.getDate();
      it.due=d.getFullYear()+'-'+(mm<10?'0':'')+mm+'-'+(dd<10?'0':'')+dd;
    }
  } else if(direct){it.due=direct;}
  saveItems();renderTable();closePopup();
}
document.addEventListener('click',function(e){
  var pop=document.getElementById('date-popup');
  if(pop.style.display!=='none'&&!pop.contains(e.target))closePopup();
});

// ---- RENDER TABLE ----
function dueCellHtml(it){
  var dc=dueClass(it.due);
  if(it.due){
    return '<button class="due-btn '+dc+'" onclick="openPopup('+it.id+',this);event.stopPropagation()">'+formatDue(it.due)+'</button>'
      +'<button class="due-clear" onclick="clearDue('+it.id+');event.stopPropagation()" title="Clear date">✕</button>';
  }
  return '<button class="due-btn due-none" onclick="openPopup('+it.id+',this);event.stopPropagation()">+ date</button>';
}

function renderTable(){
  computeDuplicates();
  var filtered=getFilteredItems();
  document.getElementById('item-count').textContent=filtered.length+' items';
  updateFinance();
  var tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  filtered.forEach(function(it){
    var urgency=rowUrgency(it);
    var isDup=_dupKeys.has(itemKey(it));
    var tr=document.createElement('tr');
    var cls=[it.need?'need-row':'',urgency,isDup?'dup-warning':''].filter(Boolean).join(' ');
    tr.className=cls;
    tr.dataset.id=it.id;

    // Need checkbox
    var tdNeed=document.createElement('td');tdNeed.className='td-need';
    var chk=document.createElement('input');chk.type='checkbox';chk.className='need-check';chk.checked=!!it.need;
    (function(id){chk.onchange=function(){toggleNeed(id,this.checked);};})(it.id);
    tdNeed.appendChild(chk);

    // Due date
    var tdDue=document.createElement('td');tdDue.className='td-due';tdDue.innerHTML=dueCellHtml(it);

    // Store #
    var tdNum=document.createElement('td');tdNum.className='td-num';
    tdNum.innerHTML=it.num?'<span class="store-num '+numClass(it.num)+'">'+escHtml(it.num)+'</span>':'';

    // Item name
    var tdItem=document.createElement('td');tdItem.className='td-item';
    var dupBadge=isDup?'<span class="dup-badge">DUP</span>':'';
    tdItem.innerHTML='<div class="item-name">'+escHtml(it.item)+dupBadge+'</div>';
    (function(id){tdItem.querySelector('.item-name').onclick=function(e){e.stopPropagation();openEditModal(id);};})(it.id);

    // Store
    var tdStore=document.createElement('td');tdStore.className='td-store';
    tdStore.innerHTML='<span class="store-name">'+escHtml(it.store)+'</span>';
    (function(id){tdStore.querySelector('.store-name').onclick=function(e){e.stopPropagation();openEditModal(id);};})(it.id);

    // Price
    var tdPrice=document.createElement('td');tdPrice.className='td-price';tdPrice.textContent=fmtPrice(it.price);

    // Edit button
    var tdEdit=document.createElement('td');tdEdit.className='td-edit';
    var editBtn=document.createElement('button');editBtn.className='edit-btn';editBtn.title='Edit';editBtn.innerHTML='✎';
    (function(id){editBtn.onclick=function(e){e.stopPropagation();openEditModal(id);};})(it.id);
    tdEdit.appendChild(editBtn);

    // Notes
    var tdNotes=document.createElement('td');tdNotes.className='td-notes';
    if(it.notes){
      var nd=document.createElement('div');nd.className='notes-text';nd.textContent=it.notes;
      nd.onclick=function(){this.classList.toggle('expanded');};
      tdNotes.appendChild(nd);
    }

    tr.append(tdNeed,tdDue,tdNum,tdItem,tdStore,tdPrice,tdEdit,tdNotes);
    tbody.appendChild(tr);
  });
}

// ---- EDIT MODAL ----
function openEditModal(id){
  _modalOpening=true;
  editingId=id;
  var it=items.find(function(x){return x.id===id;});
  if(!it){_modalOpening=false;return;}
  document.getElementById('modal-title').textContent='Edit Item';
  document.getElementById('m-item').value=it.item||'';
  document.getElementById('m-store').value=it.store||'';
  document.getElementById('m-num').value=it.num||'';
  document.getElementById('m-price').value=it.price||'';
  document.getElementById('m-notes').value=it.notes||'';
  document.getElementById('m-calc').value=it.calc||'days';
  document.getElementById('modal-delete-btn').style.display='';
  document.getElementById('edit-modal').classList.add('open');
  setTimeout(function(){_modalOpening=false;},50);
}
function openAddModal(){
  _modalOpening=true;
  editingId=null;
  document.getElementById('modal-title').textContent='Add Item';
  ['m-item','m-store','m-num','m-price','m-notes'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('m-calc').value='days';
  document.getElementById('modal-delete-btn').style.display='none';
  document.getElementById('edit-modal').classList.add('open');
  setTimeout(function(){_modalOpening=false;},50);
}
function closeModal(){document.getElementById('edit-modal').classList.remove('open');editingId=null;}
function saveModal(){
  var itemVal=document.getElementById('m-item').value.trim();
  if(!itemVal){alert('Item name required');return;}
  if(editingId!==null){
    var it=items.find(function(x){return x.id===editingId;});
    if(it){
      it.item=itemVal;
      it.store=document.getElementById('m-store').value;
      it.num=document.getElementById('m-num').value;
      it.price=document.getElementById('m-price').value;
      it.notes=document.getElementById('m-notes').value;
      it.calc=document.getElementById('m-calc').value;
    }
  } else {
    items.push({id:genId(),item:itemVal,store:document.getElementById('m-store').value,num:document.getElementById('m-num').value,price:document.getElementById('m-price').value,notes:document.getElementById('m-notes').value,calc:document.getElementById('m-calc').value,need:false,due:''});
  }
  saveItems();closeModal();renderTable();
}
function deleteItem(){
  if(!confirm('Delete this item?'))return;
  items=items.filter(function(x){return x.id!==editingId;});
  saveItems();closeModal();renderTable();
}
document.getElementById('edit-modal').addEventListener('click',function(e){if(_modalOpening)return;if(e.target===this)closeModal();});

// ---- SHOPPING MODE ----
function openShoppingMode(){
  var body=document.getElementById('shopping-mode-body');
  var needed=items.filter(function(it){return it.need;});
  var byStore={};
  needed.forEach(function(it){var s=it.store||'(no store)';if(!byStore[s])byStore[s]=[];byStore[s].push(it);});
  var storesSorted=Object.keys(byStore).sort();
  var html='';
  storesSorted.forEach(function(store){
    html+='<div class="shop-store-header">'+escHtml(store)+'</div>';
    byStore[store].forEach(function(it){
      html+='<div class="shop-item" id="si-'+it.id+'">';
      html+='<div class="shop-item-name">'+escHtml(it.item)+'</div>';
      html+='<div class="shop-item-price">'+fmtPrice(it.price)+'</div>';
      if(it.due)html+='<div class="shop-item-due">Due: '+formatDue(it.due)+'</div>';
      if(it.notes)html+='<div class="shop-item-notes">'+escHtml(it.notes)+'</div>';
      html+='<div class="shop-item-got"><label class="shop-got-check"><input type="checkbox" onchange="toggleGotIt(\'si-'+it.id+'\'  ,this.checked)" style="width:16px;height:16px;accent-color:var(--accent);"> Got it</label></div>';
      html+='</div>';
    });
  });
  if(!html)html='<p style="padding:20px;color:var(--text-muted);">No items checked as needed.</p>';
  body.innerHTML=html;
  document.getElementById('shopping-mode').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeShoppingMode(){document.getElementById('shopping-mode').classList.remove('open');document.body.style.overflow='';}
function toggleGotIt(elId,checked){var el=document.getElementById(elId);if(el)el.classList.toggle('got-it',checked);}

// ---- SYNC ----
function setSyncStatus(msg,cls){var el=document.getElementById('sync-status');if(el){el.textContent=msg;el.style.color=cls==='ok'?'#2e7d32':cls==='err'?'#c04a2a':'#b07d20';}}
function pushToCloud(){
  setSyncStatus('Saving…','pending');
  var payload={items:items,finance:{available:document.getElementById('fin-available').value}};
  fetch(JBIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JBIN_KEY,'X-Bin-Versioning':'false'},body:JSON.stringify(payload)})
    .then(function(r){return r.json();}).then(function(){setSyncStatus('Saved '+new Date().toLocaleTimeString(),'ok');})
    .catch(function(e){setSyncStatus('Save failed','err');});
}
function pullFromCloud(){
  setSyncStatus('Loading…','pending');
  fetch(JBIN_URL+'/latest',{method:'GET',headers:{'X-Master-Key':JBIN_KEY}})
    .then(function(r){return r.json();})
    .then(function(resp){
      var data=resp.record;
      if(data&&data.items&&Array.isArray(data.items)){
        items=data.items;
        if(data.finance&&data.finance.available!==undefined)document.getElementById('fin-available').value=data.finance.available;
        saveItems();renderTable();
        setSyncStatus('Loaded '+new Date().toLocaleTimeString(),'ok');
      } else {setSyncStatus('Nothing saved yet','err');}
    }).catch(function(e){setSyncStatus('Could not connect','err');});
}
function resetAndClean(){
  if(!confirm('This will clear all local data and push current items to cloud. Continue?'))return;
  localStorage.removeItem(STORE_KEY);
  localStorage.removeItem('st_finance_v3');
  setSyncStatus('Resetting…','pending');
  var payload={items:items,finance:{available:document.getElementById('fin-available').value}};
  fetch(JBIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JBIN_KEY,'X-Bin-Versioning':'false'},body:JSON.stringify(payload)})
    .then(function(r){return r.json();})
    .then(function(){setSyncStatus('Done — reloading…','ok');setTimeout(function(){location.reload(true);},900);})
    .catch(function(e){setSyncStatus('Push failed','err');});
}

// ---- BACKUP ----
function openBackupModal(){
  var data={items:items,finance:{available:document.getElementById('fin-available').value}};
  document.getElementById('backup-export-text').value=JSON.stringify(data,null,2);
  document.getElementById('backup-import-text').value='';
  document.getElementById('backup-modal').classList.add('open');
}
function closeBackupModal(){document.getElementById('backup-modal').classList.remove('open');}
document.getElementById('backup-modal').addEventListener('click',function(e){if(e.target===this)closeBackupModal();});
function copyBackup(){var t=document.getElementById('backup-export-text');t.select();document.execCommand('copy');alert('Copied!');}
function downloadBackup(){
  var data={items:items,finance:{available:document.getElementById('fin-available').value}};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  var d=new Date();a.download='shopping-backup-'+d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate()+'.json';
  a.click();
}
function restoreBackup(){
  try{
    var raw=document.getElementById('backup-import-text').value.trim();
    var data=JSON.parse(raw);
    if(data.items&&Array.isArray(data.items)){
      items=data.items;
      if(data.finance&&data.finance.available!==undefined)document.getElementById('fin-available').value=data.finance.available;
      saveItems();saveFinance();renderTable();closeBackupModal();alert('Restored successfully!');
    } else {alert('Invalid backup format.');}
  }catch(e){alert('Could not parse backup: '+e.message);}
}

// ---- INIT ----
loadItems();
loadFinance();
renderTable();
</script>
